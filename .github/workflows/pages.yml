name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A36F79: ${{ secrets.A36F79 }}
          BF2938: ${{ secrets.BF2938 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A36F79', '')
          bm = os.environ.get('BF2938', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- e0f59021165f6a51b3cd8fd0fbc2aae5beafb40a -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 7e9ae0b77a8dbab190b83acf4d0230126a7a84a7516445 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
